    {% set multiplier = printer["gcode_macro CONFIG"].multiplier0 %} 

    {% set svv = printer.save_variables.variables %}
    {% set active = svv.active0|default(0)|int %}
    {% set loaded = svv.loaded0|default(0)|int %}

    # If the feeder is active, unload and reset
    {% if active != 0 %}
        UNLOAD_AND_CUT_FILAMENT EXTRUDER=0
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_0 MOTION_QUEUE=
        FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={(0-(unactive_distance)) * multiplier} VELOCITY={load_speed}  # Retract filament
