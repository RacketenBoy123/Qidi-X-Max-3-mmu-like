[save_variables]
filename: variables.cfg

[gcode_macro CONFIG]
variable_loaded_distance9: 0
variable_loaded_distance0: 390
variable_loaded_distance1: 390
variable_loaded_distance2: 250
variable_loaded_distance3: 380

variable_unactive_distance9: 0
variable_unactive_distance0: 525
variable_unactive_distance1: 530
variable_unactive_distance2: 535
variable_unactive_distance3: 535

variable_active_distance9: 0
variable_active_distance0: 530
variable_active_distance1: 530
variable_active_distance2: 530
variable_active_distance3: 530

variable_unloaded_distance9: 0
variable_unloaded_distance0: 10
variable_unloaded_distance1: 10
variable_unloaded_distance2: 10
variable_unloaded_distance3: 10

variable_multiplier9: 0
variable_multiplier0: 1
variable_multiplier1: 1
variable_multiplier2: 1
variable_multiplier3: 1

variable_load_speed: 10
variable_feeders: 4

description: A gcode to load the config values
gcode:
    M117 Global Config Loaded... Active Distance: {active_distance0} Feeders: {feeders} GLOBAL_CONFIG: {CONFIG}

[gcode_macro RESET_VARIABLES]
description: Resets all saved variables in variables.cfg, and if a feeder is loaded will unload it
gcode:
    {% set svv = printer.save_variables.variables %}
    
    {% set feeders = printer["gcode_macro CONFIG"].feeders %}
    {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}

    {% for n in range(feeders) %}
        {% set active = svv['active' ~ n|string]|default(0)|int %}
        {% set loaded = svv['loaded' ~ n|string]|default(0)|int %}

        # Retrieve feeder-specific distances
        {% set active_distance = printer["gcode_macro CONFIG"]['active_distance' ~ n|string] %}
        {% set loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ n|string] %}
        {% set unloaded_distance = printer["gcode_macro CONFIG"]['unloaded_distance' ~ n|string] %}
        {% set multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ n|string] %}

        # Unload if active but not loaded
        {% if active != 0 and loaded == 0 %}
            M117 Resetting active Feeder {n}
            UNLOAD_AND_CUT_FILAMENT EXTRUDER={n}
            SET_GCODE_OFFSET Z_ADJUST=0
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{n}" DISTANCE={multiplier * -active_distance} VELOCITY={load_speed}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
        {% endif %}

        # Reset if loaded but not active
        {% if loaded != 0 and active == 0 %}
            M117 Resetting loaded Feeder {n}
            SET_GCODE_OFFSET Z_ADJUST=0
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{n}" DISTANCE={multiplier * -active_distance} VELOCITY={load_speed}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
        {% endif %}

        # Reset if both loaded and active
        {% if loaded != 0 and active != 0 %}
            M117 Resetting active and loaded Feeder {n}
            UNLOAD_AND_CUT_FILAMENT EXTRUDER={n}
            SET_GCODE_OFFSET Z_ADJUST=0
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{n}" DISTANCE={multiplier * -active_distance} VELOCITY={load_speed}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
        {% endif %}

        SAVE_VARIABLE VARIABLE=active{n} VALUE=0
        SAVE_VARIABLE VARIABLE=loaded{n} VALUE=0
    {% endfor %}

    SAVE_VARIABLE VARIABLE=last_feeder VALUE=9

    M117 All feeders reset!



[gcode_macro CHECK_RESETS]
description: This gcode checks if the variables.cfg file has already been generated, if not then it calls the RESET_VARIBBABLES macro
gcode:
    {% set svv = printer.save_variables.variables %}

    # Check if 'used' exists in saved variables
    {% if 'used' not in svv %}
        # Variable 'used' is not defined, initialize it
        RESET_VARIABLES
        SAVE_VARIABLE VARIABLE=used VALUE=1
    {% else %}
        # Variable 'used' exists, increment its value
        {% set used = svv.used|int %}  # Ensure 'used' is treated as an integer
        SAVE_VARIABLE VARIABLE=used VALUE={used + 1}
    {% endif %}




[gcode_macro AUTO_Z_OFFSET]
description: Start printing
gcode:
    {% set FILAMENT = params.FILAMENT_TYPE|default("PLA")|string %}
    
    {% if FILAMENT == "PLA" %}
        SET_GCODE_OFFSET Z=0.0
    {% elif FILAMENT == "PLA+" %}
        SET_GCODE_OFFSET Z=0.0
    {% elif FILAMENT == "ABS" %}
        SET_GCODE_OFFSET Z=0.09
    {% elif FILAMENT == "ASA" %}
        SET_GCODE_OFFSET Z=0.09
    {% elif FILAMENT == "PC" %}
        SET_GCODE_OFFSET Z=-0.03
    {% elif FILAMENT == "PETG" %}
        SET_GCODE_OFFSET Z=-0.01
    {% else %}
        SET_GCODE_OFFSET Z=0.0
    {% endif %}



[gcode_macro PRINT_START]
description: Start printing
gcode:
    CLEAR_PAUSE

    # Ensure all axes are homed
    # G28 ; Home all axes

    # Clear any existing bed mesh and create a new one
    BED_MESH_CLEAR

    {% set svv = printer.save_variables.variables %}
    {% set feeders = printer["gcode_macro CONFIG"].feeders %}
    {% set last_feeder = svv.last_feeder %}

    {% set active = 9 %}

    {% for n in range(feeders) %}
        {% set activen = svv['active' ~ n|string]|default(0)|int %}
        {% if activen == 1 %}
            {% set active = n %}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{active}" ENABLE=1
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{active} MOTION_QUEUE=extruder
            # SAVE_VARIABLE VARIABLE=last_feeder VALUE={active}
        {% else %}
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
        {% endif %}
    {% endfor %}

    {% if last_feeder == 9 %}
        M117 Error: No active feeder!
        T0
    {% endif %}
    

[gcode_macro PRINT_END]
description: End printing
gcode:
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    {% if printer.toolhead.position.z < (max_z - 12) %}
        {% set z_hop = 2  %}
        {% set z_safe = max_z - 10 %}
    {% else %}
        {% set z_hop = 0 %}
        {% set z_safe = max_z %}
    {% endif %}

    G91 ; Relative positioning
    G0 Z{z_hop} E-4.0 F3600 ; Move nozzle up and retract filament
    G90 ; Absolute positioning
    G0 X{max_x/2} Y{max_y-40} F20000 ; Move nozzle to remove stringing 
    G0 Z{z_safe} F3600 ; Move nozzle up

	M106 P0 S0 ; Turn off part cooling fan
	M106 P2 S0 ; Turn off side fan
	M106 P3 S0 ; Turn off activated charcoal fan

	M104 S0 ; Turn off hotend
	M140 S0 ; Turn off heated bed
	M141 S0 ; Turn off heated chamber

	M220 S100 ; Reset feedrate percentage to default
	M221 S100 ; Reset flow percentage to default

	G1 Z300 F600 ; Lower bed for easy part removal

	SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} ; Reset idle timeout

	CLEAR_PAUSE ; Ensure pause state is cleared if applicable

	# Avoid disabling steppers unless necessary. Uncomment the following line if needed:
	# M84 ; Disable steppers
	
	BEEP I=2 DUR=500 ; Notify print end with a beep

    {% set svv = printer.save_variables.variables %}
    {% set feeders = printer["gcode_macro CONFIG"].feeders %}

    {% for n in range(feeders) %}
        {% set activen = svv['active' ~ n|string]|default(0)|int %}
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
    {% endfor %}

    

[delayed_gcode reset]
# description: Every restart this gcode ckecks which feeder is active and which isnt
initial_duration: 3
gcode: 
    {% set svv = printer.save_variables.variables %}
    {% set feeders = printer["gcode_macro CONFIG"].feeders %}
    {% set last_feeder = svv.last_feeder %}

    {% set active = 9 %}

    {% for n in range(feeders) %}
        {% set activen = svv['active' ~ n|string]|default(0)|int %}
        {% if activen == 1 %}
            {% set active = n %}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{active}" ENABLE=1
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{active} MOTION_QUEUE=extruder
            # SAVE_VARIABLE VARIABLE=last_feeder VALUE={active}
        {% else %}
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{n} MOTION_QUEUE=
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{n}" ENABLE=0
        {% endif %}
    {% endfor %}

    {% if last_feeder == 9 %}
        M117 Error: No active feeder! {active}
    {% endif %}

[gcode_macro G28]
description: Homing macro
rename_existing: G28.1
gcode:
    # Clear any existing bed mesh before homing
    # BED_MESH_CLEAR
    
    # Home all axes or specific ones based on parameters provided (X, Y, Z)
    {% set home_all = ('X' in rawparams.upper() and 'Y' in rawparams.upper() and 'Z' in rawparams.upper()) or 
                      ('X' not in rawparams.upper() and 'Y' not in rawparams.upper() and 'Z' not in rawparams.upper()) %}
    {% set home_current_x = printer.configfile.settings['tmc2209 stepper_x'].run_current * 0.8 %}
    {% set home_current_y = printer.configfile.settings['tmc2209 stepper_y'].run_current * 0.8 %}

    {% set init_XY_move = -30 %}
    {% set z_clearance = 10 %}
    {% set bed_center_x = printer.toolhead.axis_maximum.x / 2 %}
    {% set bed_center_y = printer.toolhead.axis_maximum.y / 2 %}
    {% set home_all_final_position_z = 25 %}

    # Home X and Y axes first if required
    {% if home_all or 'X' in rawparams.upper() or 'Y' in rawparams.upper() %}
        G91 ; Relative positioning for initial moves
        FORCE_MOVE STEPPER=stepper_z DISTANCE=10 VELOCITY=10 ; Raise Z slightly for clearance during XY homing
        FORCE_MOVE STEPPER=stepper_x DISTANCE=-30 VELOCITY=40 ; Small move to unstick X axis before homing 
        FORCE_MOVE STEPPER=stepper_y DISTANCE=-30 VELOCITY=40 ; Small move to unstick Y axis before homing 
        G90 ; Switch back to absolute positioning
        
		{% if home_all or 'X' in rawparams.upper() %}
            SET_TMC_CURRENT STEPPER=stepper_x CURRENT={home_current_x}
            G28.1 X ; Home X axis fully using renamed macro logic
            SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer.configfile.settings['tmc2209 stepper_x'].run_current}
            G1 X{("%.2f" % bed_center_x)} F1200
		{% endif %}

		{% if home_all or 'Y' in rawparams.upper() %}
            SET_TMC_CURRENT STEPPER=stepper_y CURRENT={home_current_y}
            G28.1 Y
            SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer.configfile.settings['tmc2209 stepper_y'].run_current}
            G1 Y315 F1200
		{% endif %}
	{% endif %}

	# Home Z-axis last at the center of the bed for safety and precision.
	{% if home_all or 'Z' in rawparams.upper() %}
        G90
        G1 X{("%.2f" % bed_center_x)} Y{("%.2f" % bed_center_y)} F7800
        
	    G28.1 Z ; Home Z axis fully using renamed macro logic 
        G1 Z{home_all_final_position_z} F600
	{% endif %}

	G90 ; Ensure absolute positioning after homing is complete.


