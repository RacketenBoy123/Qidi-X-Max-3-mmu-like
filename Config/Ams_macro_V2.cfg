            {% if printer.toolhead.homed_axes != "xyz" %}
                G28
            {% endif %}
        
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_0 MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={(active_distance) * multiplier} VELOCITY={load_speed}  #Push filament

            # G1 X320 Y130 Z90 F6000

            # # Move to third position (just before cutting)
            # G1 X320 Y1 F6000

            # # Move to fourth position (cutting position)
            # G1 X320 Y-4 F600
  
            # FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={9 * multiplier} VELOCITY={load_speed/3}

            # G1 X320 Y-3 F600

            # FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={4 * multiplier} VELOCITY={load_speed/3}

            # G1 X320 Y-2 F600
  
            # FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={4 * multiplier} VELOCITY={load_speed/3}

            # G1 X320 Y-1 F600

            # FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={4 * multiplier} VELOCITY={load_speed/3}

            # G1 X320 Y5 F600
            
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_0" ENABLE=1
            
            SAVE_VARIABLE VARIABLE=loaded0 VALUE=0 
            SAVE_VARIABLE VARIABLE=active0 VALUE=1 
            SAVE_VARIABLE VARIABLE=last_feeder VALUE=0 
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_0 MOTION_QUEUE=extruder
        {% endif %}

        {% if svv.active1 == 1 and svv.active2 == 0 and svv.active3 == 0 %}
            SAVE_VARIABLE VARIABLE=last_feeder VALUE=1
