        SAVE_VARIABLE VARIABLE=loaded0 VALUE=1
        SAVE_VARIABLE VARIABLE=active0 VALUE=0
    {% endif %}

    # If the feeder is loaded, check other feeders and activate if conditions are met
    {% if loaded != 0 %}
