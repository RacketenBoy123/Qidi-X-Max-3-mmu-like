description: This macro Wipes the nozzle to clean it
gcode:

    CHECK_RESETS

    # Save the current X, Y, and Z positions
    {% if "x" in printer.toolhead.homed_axes %}
        {% set current_x = printer.toolhead.position.x %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% else %}
        {% set current_x = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% endif %}
    {% if "y" in printer.toolhead.homed_axes %}
        {% set current_y = printer.toolhead.position.y %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% else %}
        {% set current_y = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% endif %}
    {% if "z" in printer.toolhead.homed_axes %}
        {% set current_z = printer.toolhead.position.z %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% else %}
        {% set current_z = 90 %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% endif %}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    ## Clean
    # Move to clean position (X-4 Y40 to Y10)
    G1 X-1 Y70 F36000
    G1 X-4 Y50 F6000
    
    {% for n in range(5) %}
        G1 Y10 F6000
        G1 Y40 F6000
    {% endfor %}

    G1 X{current_x} Y{current_y} Z{current_z} F36000




##  Unload and cut the current filament
[gcode_macro UNLOAD_AND_CUT_FILAMENT]
description: Optimized macro for post-extruder filament cutter with filament-type awareness
gcode:
    CHECK_RESETS

    {% set feeder = params.EXTRUDER|int|default(9)|int %}
    {% set svv = printer.save_variables.variables %}
    
    # Get filament type for this feeder
    {% set filament_type = svv['filament_t' ~ feeder|string]|default("PLA")|string %}
    
    # Define filament-specific unloading temperatures
    {% set temp_map = {
        "'PLA'": 200, "'PLA+'": 205, "'ABS'": 240, "'ASA'": 240,
        "'PETG'": 230, "'PETG-CF'": 235, "'PETG-GF'": 235,
        "'PC'": 260, "'PLA-CF'": 210, "'PLA-GF'": 210,
        "'TPU'": 220, "'HIPS'": 235, "'WOOD'": 200, "'METAL'": 210
    } %}
    
    # Get optimal unloading temperature
    {% set unload_temp = temp_map[filament_type]|default(220) %}
    
    # Save current position efficiently
    {% set current_x = printer.toolhead.position.x|default(162.5)|float %}
    {% set current_y = printer.toolhead.position.y|default(162.5)|float %}
    {% set current_z = printer.toolhead.position.z|default(90)|float %}
    
    # Store current temperature for restoration
    {% set current_temp = printer.extruder.temperature|default(0)|float %}
    SAVE_VARIABLE VARIABLE=last_temp VALUE={current_temp}

    # Ensure homing
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    M118 Unloading {filament_type} at {unload_temp}°C...
    
    # Heat to optimal unloading temperature
    M109 S{unload_temp}
    
    # Sync extruder for retraction
    SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{feeder} MOTION_QUEUE=extruder
    
    # Optimized retraction sequence
    M83  ; Relative extrusion mode
    G1 E-3 F100   ; Slow initial retract to avoid stringing
    G1 E-12 F300  ; Main retraction at moderate speed
    M82  ; Absolute extrusion mode
    
    # Disconnect extruder stepper
    SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{feeder} MOTION_QUEUE=

    # POST-EXTRUDER CUTTING SEQUENCE
    # Move to position above hotend for cutting (simplified coordinates)
    G1 X{current_x} Y{current_y} Z{current_z + 15} F6000
    
    # Engage cutter (adjust coordinates based on your specific cutter design)
    # These coordinates should be calibrated for your post-extruder cutter
    # G1 Y{current_y - 5} F3000    ; Move to engage position
    # G1 Y{current_y + 2} F1000    ; Cut motion
    # G1 Y{current_y - 5} F3000    ; Complete cut
    # G1 Y{current_y} F6000        ; Return to center

    ## Cut
    # Move to first position (X270, Y130, Z slightly higher than current layer)
    G1 X270 Y130 Z{current_z + 30} F6000

    # Move to second position (X320, Y130, same Z height)
    G1 X320 Y130 Z{current_z + 30} F6000

    # Move to third position (just before cutting)
    G1 X320 Y1 Z{current_z + 30} F3000

    # Move to fourth position (cutting position)
    G1 X320 Y-16 Z{current_z + 30} F1000

    # Return to third position after cutting
    G1 X320 Y12 Z{current_z + 30} F3000
    
    # Brief cleaning sequence (reduced from original)
    G1 X-1 Y70 F24000
    M83
    G1 E5 F200    ; Small purge to clear any debris
    M82
    
    # Quick wipe (simplified from original 5 cycles to 2)
    G1 X-4 Y50 F6000
    {% for n in range(2) %}
        G1 Y20 F6000
        G1 Y40 F6000
    {% endfor %}
    
    # Return to original position
    G1 X{current_x} Y{current_y} Z{current_z} F24000
    
    # Restore original temperature if it was significant
    {% if current_temp > 100 %}
        M104 S{current_temp}
    {% else %}
        M104 S0
    {% endif %}
    
    
    M118 {filament_type} unloaded successfully!






##  Macro for the filament change, based on last feeder and active feeders and such

[gcode_macro TOOL_CHANGE]
description: Simplified tool change macro using unified load/unload system
variable_last_feeder: 5  # Default value for the last feeder
gcode:
    CHECK_RESETS

    {% set current_feeder = params.FEEDER|int|default(0)|int %}
    {% set svv = printer.save_variables.variables %}
    
    # Validate feeder number
    {% if current_feeder < 0 or current_feeder > 3 %}
        M118 Error: Invalid feeder {current_feeder}
        RESPOND TYPE=error MSG="Invalid feeder number. Use 0-3"
    {% endif %}
    
    # Save current position
    {% set last_x = printer.toolhead.position.x|default(165)|float %}
    {% set last_y = printer.toolhead.position.y|default(165)|float %}
    {% set last_z = printer.toolhead.position.z|default(200)|float %}
    
    # Get last feeder info
    {% set last_feeder = svv.last_feeder|default(9)|int %}
    {% set current_filament = svv['filament_t' ~ current_feeder|string]|default("Unknown")|string %}
    
    # Ensure only one feeder can be active
    {% set active_count = svv.active0|default(0)|int + svv.active1|default(0)|int + svv.active2|default(0)|int + svv.active3|default(0)|int %}
    
    {% if active_count <= 1 and last_feeder != current_feeder %}
        
        # Unload previous feeder if it exists and is different
        {% if last_feeder < 4 and last_feeder != current_feeder %}
            M118 Unloading T{last_feeder}...
            UNLOAD_AND_CUT_FILAMENT EXTRUDER={last_feeder}
            
            # Get last feeder config
            {% set last_multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ last_feeder|string] %}
            {% set last_unactive_distance = printer["gcode_macro CONFIG"]['unactive_distance' ~ last_feeder|string] %}
            {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}
            
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{last_feeder} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{last_feeder}" DISTANCE={(0-last_unactive_distance) * last_multiplier} VELOCITY={load_speed}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{last_feeder}" ENABLE=0
            
            SAVE_VARIABLE VARIABLE=loaded{last_feeder} VALUE=1
            SAVE_VARIABLE VARIABLE=active{last_feeder} VALUE=0
            WIPE_NOZZLE
        {% endif %}

        # Load new feeder
        M118 Loading T{current_feeder} ({current_filament})...
        
        # Get current feeder config
        {% set current_multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ current_feeder|string] %}
        {% set current_active_distance = printer["gcode_macro CONFIG"]['active_distance' ~ current_feeder|string] %}
        {% set current_loaded = svv['loaded' ~ current_feeder|string]|default(0)|int %}
        {% set current_active = svv['active' ~ current_feeder|string]|default(0)|int %}
        {% set current_loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ current_feeder|string] %}
        
        # Push filament based on current state
        {% if current_loaded != 0 %}
            # Feeder is loaded, just activate
            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={current_active_distance * current_multiplier} VELOCITY={load_speed}
        {% elif current_loaded == 0 and current_active == 0 %}
            # Feeder is unloaded, load and activate
            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={(current_active_distance + current_loaded_distance) * current_multiplier} VELOCITY={load_speed}
        {% endif %}
        
        FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={10 * current_multiplier} VELOCITY={load_speed}
        
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{current_feeder}" ENABLE=1
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{current_feeder} MOTION_QUEUE=extruder

        # Prime the new filament
        M83
        G1 E20 F300  # Prime with new filament
        M82

        WIPE_NOZZLE

        # Update states
        SAVE_VARIABLE VARIABLE=active{current_feeder} VALUE=1
        SAVE_VARIABLE VARIABLE=loaded{current_feeder} VALUE=0
        SAVE_VARIABLE VARIABLE=last_feeder VALUE={current_feeder}

        # Return to original position
        G1 X{last_x} Y{last_y} Z{last_z + 30} F36000
        G1 X{last_x} Y{last_y} Z{last_z} F6000

        M118 Tool change complete: T{current_feeder} ({current_filament})
        
    {% else %}
        M118 Error: Invalid tool change state
        GET_FILAMENT_INFO  # Show current status for debugging
    {% endif %}





[gcode_macro LOAD_FILAMENT]
description: Universal filament loading macro for all tools (0-3)
gcode:
    CHECK_RESETS
    
    # Parameter validation
    {% set tool = params.TOOL|default(-1)|int %}
    {% set filament_type = params.FILAMENT_TYPE|default("")|string|upper %}
    {% set svv = printer.save_variables.variables %}
    {% set filament = svv['filament_t' ~ tool|string]|default("Empty")|string %}
    
    # Validate tool number
    {% if tool < 0 or tool > 3 %}
        M118 Error: Invalid tool number {tool}. Use 0-3.
        RESPOND TYPE=error MSG="Invalid tool number. Use TOOL=0 to TOOL=3"
    {% endif %}

    {% if filament != "''" %}
        # Validate filament type
        {% set valid_filaments = ["ABS", "ASA", "PLA", "PLA+", "PC", "PLA-CF", "PETG", "PETG-CF", "PLA-GF", "PETG-GF", "TPU", "HIPS", "WOOD", "METAL", "CARBON"] %}
        {% if filament_type == "" %}
            M118 Error: No filament type specified for T{tool}
            RESPOND TYPE=error MSG="Filament type required. Use FILAMENT_TYPE=PLA, ABS, etc."
        {% endif %}
        {% if filament_type not in valid_filaments %}
            M118 Error: Invalid filament type '{filament_type}' for T{tool}
            RESPOND TYPE=error MSG={ "Invalid filament type. Supported: " ~ valid_filaments|join(', ') }
        {% endif %}
    {% endif %}
    
    # Get tool-specific configuration
    {% set active_distance = printer["gcode_macro CONFIG"]['active_distance' ~ tool|string] %}
    {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}
    {% set loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ tool|string] %}
    {% set unactive_distance = printer["gcode_macro CONFIG"]['unactive_distance' ~ tool|string] %}
    {% set multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ tool|string] %}
    
    # Get current states
    {% set active = svv['active' ~ tool|string]|default(0)|int %}
    {% set loaded = svv['loaded' ~ tool|string]|default(0)|int %}
    
    M118 Loading {filament_type} filament to T{tool}...
    
    # If feeder is currently active, unload and reset first
    {% if active != 0 %}
        M118 T{tool} is active, unloading first...
        UNLOAD_AND_CUT_FILAMENT EXTRUDER={tool}
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=
        FORCE_MOVE STEPPER="extruder_stepper feeder_{tool}" DISTANCE={(0-unactive_distance) * multiplier} VELOCITY={load_speed}
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{tool}" ENABLE=0
        SAVE_VARIABLE VARIABLE=loaded{tool} VALUE=1
        SAVE_VARIABLE VARIABLE=active{tool} VALUE=0
    {% endif %}
    
    # If feeder is loaded, check if we can activate it or need tool change
    {% if loaded != 0 %}
        # Check if any other tools are active
        {% set other_active = 0 %}
        {% for i in range(4) %}
            {% if i != tool %}
                {% set other_tool_active = svv['active' ~ i|string]|default(0)|int %}
                {% if other_tool_active != 0 %}
                    {% set other_active = i %}
                {% endif %}
            {% endif %}
        {% endfor %}
        
        # If no other tools active, activate this one
        {% if other_active == 0 %}
            {% if printer.toolhead.homed_axes != "xyz" %}
                G28
            {% endif %}
            
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{tool}" DISTANCE={active_distance * multiplier} VELOCITY={load_speed}
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{tool}" ENABLE=1
            
            SAVE_VARIABLE VARIABLE=loaded{tool} VALUE=0
            SAVE_VARIABLE VARIABLE=active{tool} VALUE=1
            SAVE_VARIABLE VARIABLE=last_feeder VALUE={tool}
            SAVE_VARIABLE VARIABLE=filament_t{tool} VALUE="'{filament_type}'"
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=extruder
            
            M118 T{tool} loaded and activated with {filament_type}
        # If another tool is active, perform tool change
        {% else %}
            SAVE_VARIABLE VARIABLE=last_feeder VALUE={other_active}
            SAVE_VARIABLE VARIABLE=filament_t{tool} VALUE="'{filament_type}'"
            T{tool}
            M118 Tool change: T{other_active} -> T{tool} ({filament_type})
        {% endif %}
    {% endif %}
    
    # If feeder is unloaded, load filament
    {% if loaded == 0 and active == 0 %}
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=
        FORCE_MOVE STEPPER="extruder_stepper feeder_{tool}" DISTANCE={loaded_distance * multiplier} VELOCITY={load_speed}
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{tool}" ENABLE=0
        SAVE_VARIABLE VARIABLE=loaded{tool} VALUE=1
        SAVE_VARIABLE VARIABLE=active{tool} VALUE=0
        SAVE_VARIABLE VARIABLE=filament_t{tool} VALUE="'{filament_type}'"
        M118 T{tool} loaded with {filament_type} (ready for activation)
    {% endif %}



[gcode_macro UNLOAD_FILAMENT]
description: Universal filament unloading macro for all tools (0-3)
gcode:
    CHECK_RESETS
    
    # Parameter validation
    {% set tool = params.TOOL|default(-1)|int %}
    
    # Validate tool number
    {% if tool < 0 or tool > 3 %}
        M118 Error: Invalid tool number {tool}. Use 0-3.
        RESPOND TYPE=error MSG="Invalid tool number. Use TOOL=0 to TOOL=3"
    {% endif %}
    
    # Get tool-specific configuration
    {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}
    {% set loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ tool|string] %}
    {% set unactive_distance = printer["gcode_macro CONFIG"]['unactive_distance' ~ tool|string] %}
    {% set multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ tool|string] %}
    
    # Get current states
    {% set svv = printer.save_variables.variables %}
    {% set active = svv['active' ~ tool|string]|default(0)|int %}
    {% set loaded = svv['loaded' ~ tool|string]|default(0)|int %}
    {% set current_filament = svv['filament_t' ~ tool|string]|default("Unknown")|string %}
    
    M118 Unloading T{tool} ({current_filament})...
    
    # If feeder is active, unload and cut filament first
    {% if active != 0 %}
        UNLOAD_AND_CUT_FILAMENT EXTRUDER={tool}
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=
        FORCE_MOVE STEPPER="extruder_stepper feeder_{tool}" DISTANCE={(0-unactive_distance) * multiplier} VELOCITY={load_speed}
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{tool}" ENABLE=0
        SAVE_VARIABLE VARIABLE=loaded{tool} VALUE=1
        SAVE_VARIABLE VARIABLE=active{tool} VALUE=0
        SAVE_VARIABLE VARIABLE=last_feeder VALUE=9
    {% endif %}
    
    # If feeder is loaded, retract filament completely
    {% if loaded != 0 %}
        SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{tool} MOTION_QUEUE=
        FORCE_MOVE STEPPER="extruder_stepper feeder_{tool}" DISTANCE={(0-loaded_distance) * multiplier} VELOCITY={load_speed}
        SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{tool}" ENABLE=0
        SAVE_VARIABLE VARIABLE=loaded{tool} VALUE=0
        SAVE_VARIABLE VARIABLE=active{tool} VALUE=0
        # Clear filament type tracking
        SAVE_VARIABLE VARIABLE=filament_t{tool} VALUE="''"
    {% endif %}

    M118 T{tool} unloaded successfully


