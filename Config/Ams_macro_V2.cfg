[gcode_macro AUTO_Z_OFFSET]
description: Automatic Z-offset adjustment based on filament type
gcode:
    {% set FILAMENT = params.FILAMENT_TYPE|default("PLA")|string|upper %}
    
    {% if FILAMENT == "PLA" %}
        SET_GCODE_OFFSET Z=0.0
    {% elif FILAMENT == "PLA+" %}
        SET_GCODE_OFFSET Z=0.0
    {% elif FILAMENT == "ABS" %}
        SET_GCODE_OFFSET Z=0.09
    {% elif FILAMENT == "ASA" %}
        SET_GCODE_OFFSET Z=0.09
    {% elif FILAMENT == "PC" %}
        SET_GCODE_OFFSET Z=-0.03
    {% elif FILAMENT == "PETG" %}
        SET_GCODE_OFFSET Z=-0.01
    {% elif FILAMENT == "PLA-CF" or FILAMENT == "PLA-GF" %}
        SET_GCODE_OFFSET Z=0.02
    {% elif FILAMENT == "PETG-CF" or FILAMENT == "PETG-GF" %}
        SET_GCODE_OFFSET Z=0.01
    {% elif FILAMENT == "TPU" %}
        SET_GCODE_OFFSET Z=0.05
    {% elif FILAMENT == "HIPS" %}
        SET_GCODE_OFFSET Z=0.08
    {% elif FILAMENT == "WOOD" %}
        SET_GCODE_OFFSET Z=0.03
    {% elif FILAMENT == "METAL" %}
        SET_GCODE_OFFSET Z=0.02
    {% elif FILAMENT == "CARBON" %}
        SET_GCODE_OFFSET Z=0.02
    {% else %}
        SET_GCODE_OFFSET Z=0.0
        M118 Unknown filament '{FILAMENT}', using default Z-offset
    {% endif %}
    
    M118 Z-offset set for {FILAMENT}


