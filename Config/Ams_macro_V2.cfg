##  Wipe Nozzle clean

[gcode_macro WIPE_NOZZLE]
description: This macro Wipes the nozzle to clean it
gcode:

    CHECK_RESETS

    # Save the current X, Y, and Z positions
    {% if "x" in printer.toolhead.homed_axes %}
        {% set current_x = printer.toolhead.position.x %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% else %}
        {% set current_x = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% endif %}
    {% if "y" in printer.toolhead.homed_axes %}
        {% set current_y = printer.toolhead.position.y %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% else %}
        {% set current_y = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% endif %}
    {% if "z" in printer.toolhead.homed_axes %}
        {% set current_z = printer.toolhead.position.z %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% else %}
        {% set current_z = 90 %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% endif %}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    ## Clean
    # Move to clean position (X-4 Y40 to Y10)
    G1 X-1 Y70 F36000
    G1 X-4 Y50 F6000
    
    {% for n in range(5) %}
        G1 Y10 F6000
        G1 Y40 F6000
    {% endfor %}

    G1 X{current_x} Y{current_y} Z{current_z} F36000




##  Unload and cut the current filament

[gcode_macro UNLOAD_AND_CUT_FILAMENT]
description: This macro unloads and cuts filament, stores the current hotend temperature, heats to 240°C, retracts filament, and restores the original temperature.
gcode:

    CHECK_RESETS

    # Save the current X, Y, and Z positions
    {% if "x" in printer.toolhead.homed_axes %}
        {% set current_x = printer.toolhead.position.x %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% else %}
        {% set current_x = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_x VALUE={current_x}
    {% endif %}
    {% if "y" in printer.toolhead.homed_axes %}
        {% set current_y = printer.toolhead.position.y %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% else %}
        {% set current_y = 162.5 %}
        SAVE_VARIABLE VARIABLE=last_y VALUE={current_y}
    {% endif %}
    {% if "z" in printer.toolhead.homed_axes %}
        {% set current_z = printer.toolhead.position.z %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% else %}
        {% set current_z = 90 %}
        SAVE_VARIABLE VARIABLE=last_z VALUE={current_z}
    {% endif %}
    
    {% set feeder = params.EXTRUDER|int|default(9)|int %}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Save the current hotend temperature
    {% if printer.extruder.temperature is not none and printer.extruder.temperature > 100 %}
        {% set current_temp = printer.extruder.temperature %}
    {% else %}
        {% set current_temp = 0 %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=last_temp VALUE={current_temp}

    # Heat hotend to 240°C
    M109 S240  ; Wait until hotend reaches 240°C
    
    # Retract filament by 6 mm
    SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{feeder} MOTION_QUEUE=extruder
    M83  ; Set relative extrusion mode
    G1 E-10 F300  ; Retract filament by 30 mm at 300 mm/min
    M82  ; Set back to absolute extrusion mode

    # Restore original hotend temperature
    # M104 S{current_temp}  ; Set hotend back to original temperature (non-blocking)


    SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{feeder} MOTION_QUEUE=

    ## Cut
    # Move to first position (X270, Y130, Z slightly higher than current layer)
    G1 X270 Y130 Z{current_z + 30} F6000

    # Move to second position (X320, Y130, same Z height)
    G1 X320 Y130 Z{current_z + 30} F6000

    # Move to third position (just before cutting)
    G1 X320 Y1 Z{current_z + 30} F3000

    # Move to fourth position (cutting position)
    G1 X320 Y-16 Z{current_z + 30} F1000

    # Return to third position after cutting
    G1 X320 Y12 Z{current_z + 30} F3000

    ## Clean
    # Move to flush position (X70, Y325)
    G1 X70 Y325 F6000
    M83
    G1 E20 F300 
    M82

    G4 P10000

    # Move to clean position (X50)
    G1 X-4 Y50 F36000
    
    {% for n in range(5) %}
        G1 Y10 F6000
        G1 Y40 F6000
    {% endfor %}

    G1 X70 Y325 F36000
    
    # Restore original hotend temperature
    # M104 S{current_temp}  ; Set hotend back to original temperature (non-blocking)






##  Macro for the filament change, based on last feeder and active feeders and such

[gcode_macro TOOL_CHANGE]
description:  Macro to handle tool changes with dynamic movement direction 
variable_last_feeder: 5  # Default value for the last feeder

gcode:
    CHECK_RESETS

    {% set feeders = printer["gcode_macro CONFIG"].feeders %}
    {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}
    {% set current_feeder = params.FEEDER|int|default(0)|int %}  # Get the current feeder from input parameter
    {% set svv = printer.save_variables.variables %}

    # Save the current X, Y, and Z positions
    {% set last_x = printer.toolhead.position.x|default(165)|float %}
    {% set last_y = printer.toolhead.position.y|default(165)|float %}
    {% set last_z = printer.toolhead.position.z|default(200)|float %}
    {% set last_temp = svv['active' ~ last_temp|string]|default(0)|int %}
    

    # Retrieve feeder-specific variables for the current feeder
    {% set current_active_distance = printer["gcode_macro CONFIG"]['active_distance' ~ current_feeder|string] %}
    {% set current_loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ current_feeder|string] %}
    {% set current_unloaded_distance = printer["gcode_macro CONFIG"]['unloaded_distance' ~ current_feeder|string] %}
    {% set current_unactive_distance = printer["gcode_macro CONFIG"]['unactive_distance' ~ current_feeder|string] %}
    {% set current_multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ current_feeder|string] %}

    # Retrieve feeder-specific variables for the last feeder
    {% set last_feeder = svv.last_feeder|default(9)|int %}
    {% if last_feeder < 5 %}
        {% set last_active_distance = printer["gcode_macro CONFIG"]['active_distance' ~ last_feeder|string]|default(0)|int %}
        {% set last_loaded_distance = printer["gcode_macro CONFIG"]['loaded_distance' ~ last_feeder|string]|default(0)|int %}
        {% set last_unloaded_distance = printer["gcode_macro CONFIG"]['unloaded_distance' ~ last_feeder|string]|default(0)|int %}
        {% set last_unactive_distance = printer["gcode_macro CONFIG"]['unactive_distance' ~ last_feeder|string] %}
        {% set last_multiplier = printer["gcode_macro CONFIG"]['multiplier' ~ last_feeder|string]|default(0)|int %}
        {% set last_feeder_active = svv['active' ~ last_feeder|string]|default(0)|int %}
        {% set last_feeder_loaded = svv['loaded' ~ last_feeder|string]|default(0)|int %}
    {% else %}
        {% set last_active_distance = 0 %}
        {% set last_loaded_distance = 0 %}
        {% set last_unloaded_distance = 0 %}
        {% set last_multiplier = 0 %}  # Default value for undefined multiplier
        {% set last_feeder_active = 0 %}
        {% set last_feeder_loaded = 0 %}
    {% endif %}

    # Retrieve active and loaded states for the current feeder
    {% set current_feeder_active = svv['active' ~ current_feeder|string]|default(0)|int %}
    {% set current_feeder_loaded = svv['loaded' ~ current_feeder|string]|default(0)|int %}

    # Ensure only one feeder is active at a time
    {% if svv.active0 + svv.active1 + svv.active2 + svv.active3 <= 1 and last_feeder != current_feeder %}

        # If there was a previous feeder, retract its filament
        {% if last_feeder < 5 and last_feeder != current_feeder %}
            M117 Retracting filament from Feeder {last_feeder}...
            UNLOAD_AND_CUT_FILAMENT EXTRUDER={last_feeder}
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{last_feeder} MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_{last_feeder}" DISTANCE={(last_unactive_distance) * (0 - last_multiplier)} VELOCITY={load_speed}
            SAVE_VARIABLE VARIABLE=loaded{last_feeder} VALUE=1
            SAVE_VARIABLE VARIABLE=active{last_feeder} VALUE=0
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{last_feeder}" ENABLE=0
            WIPE_NOZZLE
        {% endif %}

        # Push filament for the new feeder
        M117 Loading filament with Feeder {current_feeder}...
        {% if current_feeder_loaded != 0 %}

            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={(current_active_distance) * current_multiplier} VELOCITY={load_speed}
            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={10 * current_multiplier} VELOCITY={load_speed}

            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{current_feeder}" ENABLE=1
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{current_feeder} MOTION_QUEUE=extruder

        {% endif %}

        {% if current_feeder_loaded == 0 and current_feeder_active == 0 %}
            
            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={(current_active_distance + current_loaded_distance) * current_multiplier} VELOCITY={load_speed}
            FORCE_MOVE STEPPER="extruder_stepper feeder_{current_feeder}" DISTANCE={10 * current_multiplier} VELOCITY={load_speed}

            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_{current_feeder}" ENABLE=1
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_{current_feeder} MOTION_QUEUE=extruder

        {% endif %}
        
        M83
        G1 E100 F300
        M82

        M104 S{last_temp}

        ## Clean
        # Move to clean position (X-4 Y40 to Y10)
        G1 X-1 Y70 F36000
        G1 X-4 Y50 F6000
    
        {% for n in range(5) %}
            G1 Y10 F6000
            G1 Y40 F6000
        {% endfor %}

        # Update active and loaded states for feeders
        SAVE_VARIABLE VARIABLE=active{current_feeder} VALUE=1
        SAVE_VARIABLE VARIABLE=loaded{current_feeder} VALUE=0

        # Save the current feeder as the last used feeder
        SAVE_VARIABLE VARIABLE=last_feeder VALUE={current_feeder}

        G1 X{last_x} Y{last_y} Z{last_z+30} F36000
        G1 X{last_x} Y{last_y} Z{last_z} F36000

    M117 Tool Change Completed.
    {% else %}
        M117 Error: Invalid state detected! Active states: A0={svv.active0}, A1={svv.active1}, A2={svv.active2}, A3={svv.active3}
    {% endif %}







