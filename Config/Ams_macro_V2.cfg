            T0
        {% endif %}

        {% if svv.active1 == 0 and svv.active2 == 0 and svv.active3 == 1 %}
            SAVE_VARIABLE VARIABLE=last_feeder VALUE=3
            T0
        {% endif %}
        
    {% endif %}

    # If the feeder is neither active nor loaded, reset and prepare for loading
    {% if loaded == 0 %}
        {% if active == 0 %}
            SYNC_EXTRUDER_MOTION EXTRUDER=feeder_0 MOTION_QUEUE=
            FORCE_MOVE STEPPER="extruder_stepper feeder_0" DISTANCE={loaded_distance * multiplier} VELOCITY={load_speed}  # Retract filament  # Load filament
            SET_STEPPER_ENABLE STEPPER="extruder_stepper feeder_0" ENABLE=0
            SAVE_VARIABLE VARIABLE=loaded0 VALUE=1
            SAVE_VARIABLE VARIABLE=active0 VALUE=0
        {% endif %}
    {% endif %}






