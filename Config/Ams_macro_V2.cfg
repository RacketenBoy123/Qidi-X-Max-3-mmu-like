##  T0, which gets used by the slicer and gcode in general

[gcode_macro T0]
description: Macro for Tool 0 (Feeder 0)
gcode:
    {% set active_distance = printer["gcode_macro CONFIG"].active_distance %}
    {% set load_speed = printer["gcode_macro CONFIG"].load_speed %}
    {% set unloaded_distance =printer["gcode_macro CONFIG"].unloaded_distance %}
    {% set loaded_distance = printer["gcode_macro CONFIG"].loaded_distance %}
    {% set feeders = printer["gcode_macro CONFIG"].feeders %} 
    {% set multiplier = printer["gcode_macro CONFIG"].multiplier0 %} 
    
    M117 Switching to Tool 1... ; Display message
