[save_variables]
filename: variables.cfg


###############################################################################
##  Enhanced Console Output Configuration
###############################################################################

# Enable RESPOND command and M118 for enhanced console output
# This replaces M118 commands with console-friendly alternatives that support:
# - Multi-line text display in Mainsail/Fluidd console
# - Better message categorization (info, error, warning)
# - Improved readability in terminal output
[respond]
default_type: echo
#   Sets the default prefix of the "M118" and "RESPOND" output to one
#   of the following:
#       echo: "echo: " (This is the default)
#       command: "// "
#       error: "!! "
#default_prefix: echo:
#   Directly sets the default prefix. If present, this value will
#   override the "default_type".


