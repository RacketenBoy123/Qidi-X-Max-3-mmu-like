###############################################################################
##  MCU Config
###############################################################################

[mcu AMS]
serial: /dev/serial/by-id/usb-Klipper_rp2040_454741505B88DAAA-if00  # SKR Pico serial connection
restart_method: command



###############################################################################
##  Feeder 0, X axis
###############################################################################

[extruder_stepper feeder_0] ##Second Pin / X Motor
step_pin: AMS:gpio11
dir_pin: ! AMS:gpio10
enable_pin: ! AMS:gpio12
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 3:1
rotation_distance: 23.7 # Calculated based on E-steps reference value of 385
# endstop_pin: tmc2209_extruder_stepper_feeder_0:virtual_endstop
# velocity: 20
# accel: 200
extruder: extruder
pressure_advance: 0.020
pressure_advance_smooth_time: 0.03


[tmc2209 extruder_stepper feeder_0]
uart_pin: AMS:gpio9
tx_pin: AMS:gpio8
uart_address: 0
run_current: 0.8
hold_current: 0.4
stealthchop_threshold: 999999
# diag_pin: ^gpio4
# driver_SGTHRS: 100



###############################################################################
##  Feeder 1, Y axis
###############################################################################

[extruder_stepper feeder_1] ##Third Pin / Y Motor
step_pin: AMS:gpio6
dir_pin: ! AMS:gpio5
enable_pin: ! AMS:gpio7
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 3:1
rotation_distance: 23.7 # Calculated based on E-steps reference value of 385
# endstop_pin: tmc2209_extruder_stepper_feeder_1:virtual_endstop
# velocity: 20
# accel: 200
extruder: extruder
pressure_advance: 0.020
pressure_advance_smooth_time: 0.03

[tmc2209 extruder_stepper feeder_1]
uart_pin: AMS:gpio9
tx_pin: AMS:gpio8
uart_address: 2
run_current: 0.8
hold_current: 0.6
stealthchop_threshold: 999999
# diag_pin: ^gpio3
# driver_SGTHRS: 100




###############################################################################
##  Feeder 2, Z axis
###############################################################################

[extruder_stepper feeder_2] ##Fourth and fifth Pin / Z Motor
step_pin: AMS:gpio19
dir_pin: ! AMS:gpio28
enable_pin: ! AMS:gpio2
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 3:1
rotation_distance: 23.7  # Calculated based on E-steps reference value of 385
# endstop_pin: tmc2209_extruder_stepper_feeder_2:virtual_endstop
# velocity: 20
# accel: 200
extruder: extruder
pressure_advance: 0.020
pressure_advance_smooth_time: 0.03

[tmc2209 extruder_stepper feeder_2]
uart_pin: AMS:gpio9
tx_pin:AMS: gpio8
uart_address: 1
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999




###############################################################################
##  Feeder 3, E axis
###############################################################################

[extruder_stepper feeder_3] ##First Pin / E Motor
step_pin: AMS:gpio14
dir_pin: ! AMS:gpio13
enable_pin: ! AMS:gpio15
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 3:1
rotation_distance: 23.7 ##23.6 ##23.606664444444 ##23.57 pretty close ##23.4 ##24.935 ##8.3117 ##7.86 ##7.9009099844449 a bit to under 20mm in 3.46m ##7.9209099844449 way to under ##7.8964526666667 ##7.820810998  # Calculated based on E-steps reference value of 385
# endstop_pin: tmc2209_extruder_stepper_feeder_3:virtual_endstop
# velocity: 20
# accel: 200
extruder: extruder
pressure_advance: 0.020
pressure_advance_smooth_time: 0.03

[tmc2209 extruder_stepper feeder_3]
uart_pin: AMS:gpio9
tx_pin: AMS:gpio8
uart_address: 3
run_current: 0.650
hold_current: 0.500
stealthchop_threshold: 999999




###############################################################################
##  Filament Sensor (Optional)
###############################################################################

# [filament_switch_sensor ams_runout_sensor]
