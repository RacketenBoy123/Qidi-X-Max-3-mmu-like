###############################################################################
##  Fan configs
###############################################################################

[heater_fan board_fan2]
pin: AMS:gpio17

[heater_fan hotend_fan]
pin: AMS:gpio18
heater: extruder
heater_temp: 50.0

[heater_fan controller_fan]
pin: ! AMS:gpio20
heater: heater_bed
heater_temp: 45.0



###############################################################################
##  Temp sensors
###############################################################################

[temperature_sensor AMS_RP2040]
sensor_type: temperature_mcu
sensor_mcu: AMS
min_temp: 0
max_temp: 100




###############################################################################
##  RGB
###############################################################################

[neopixel board_rgb]
pin: AMS:gpio24
chain_count: 1
color_order: GRB
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3